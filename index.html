<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חשבון למיקה</title>
    <link rel="icon" href="icon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        .ltr-text { direction: ltr; display: inline-block; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        
        // רכיב אייקונים מותאם ל-GitHub
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const iconSvg = lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-block leading-none"></span>;
        };

        const MathGame = () => {
            const levels = {
                practice: { label: 'אימון', questions: 30, color: 'bg-teal-500', hasTimer: false },
                easy: { label: 'קל', time: 60, questions: 10, color: 'bg-green-500', hasTimer: true },
                medium: { label: 'בינוני', time: 30, questions: 20, color: 'bg-blue-500', hasTimer: true },
                hard: { label: 'קשה', time: 15, questions: 30, color: 'bg-orange-500', hasTimer: true },
                expert: { label: 'מומחה', time: 5, questions: 60, color: 'bg-purple-600', hasTimer: true },
                genius: { label: 'גאון', time: 1.5, questions: 60, color: 'bg-red-600', hasTimer: true }
            };

            const positivePhrases = ["נכון מאוד!", "כל הכבוד!", "מצויין!", "את אלופה!", "יופי מיקה!"];
            const [gameState, setGameState] = useState('menu');
            const [currentLevel, setCurrentLevel] = useState('easy');
            const [score, setScore] = useState(0);
            const [problem, setProblem] = useState({ a: 0, b: 0, op: '+', result: 0 });
            const [userInput, setUserInput] = useState('');
            const [timeLeft, setTimeLeft] = useState(60);
            const [feedback, setFeedback] = useState(null);

            const playSound = (type) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    const now = ctx.currentTime;
                    if (type === 'correct') {
                        osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(1046, now + 0.1);
                        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    } else {
                        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
                        gain.gain.setValueAtTime(0.1, now);
                    }
                    osc.start(now); osc.stop(now + 0.5);
                } catch(e) {}
            };

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text); u.lang = 'he-IL';
                    window.speechSynthesis.speak(u);
                }
            };

            const generateProblem = useCallback(() => {
                const isAdd = Math.random() > 0.5;
                const a = Math.floor(Math.random() * 10) + 1;
                const b = Math.floor(Math.random() * 10) + 1;
                setProblem(isAdd ? { a, b, op: '+', result: a+b } : { a: a+b, b, op: '-', result: a });
                setUserInput(''); setFeedback(null);
                if (levels[currentLevel].hasTimer) setTimeLeft(levels[currentLevel].time);
            }, [currentLevel]);

            const startGame = (key) => {
                setCurrentLevel(key); setGameState('playing'); setScore(0);
                setTimeout(generateProblem, 10);
                speak(`בהצלחה מיקה, רמת ${levels[key].label}`);
            };

            const submit = () => {
                if (parseInt(userInput) === problem.result) {
                    setFeedback('correct'); setScore(s => s + 1); playSound('correct');
                    speak(positivePhrases[Math.floor(Math.random() * positivePhrases.length)]);
                    if (score + 1 >= levels[currentLevel].questions) setTimeout(() => setGameState('won'), 1500);
                    else setTimeout(generateProblem, 1200);
                } else {
                    setFeedback('wrong'); playSound('wrong'); setTimeout(() => setFeedback(null), 800);
                }
            };

            useEffect(() => {
                if (gameState === 'playing' && levels[currentLevel].hasTimer && timeLeft > 0) {
                    const t = setTimeout(() => setTimeLeft(prev => Math.max(0, prev - 0.1)), 100);
                    return () => clearTimeout(t);
                } else if (timeLeft === 0 && gameState === 'playing') {
                    setGameState('gameover'); speak("נגמר הזמן");
                }
            }, [timeLeft, gameState]);

            return (
                <div className="flex flex-col items-center justify-center min-h-screen font-sans">
                    <div className="bg-white p-4 rounded-xl shadow-sm mb-4 w-full max-w-md flex justify-between items-center">
                         <span className="font-bold text-blue-600">שאלה {score + 1}</span>
                         <h1 className="text-xl font-black text-gray-700">חשבון למיקה</h1>
                         <button onClick={() => setGameState('menu')}><Icon name="ArrowLeft" className="text-gray-400" /></button>
                    </div>

                    {gameState === 'menu' && (
                        <div className="flex flex-col gap-3 w-full max-w-md">
                            {Object.entries(levels).map(([key, lvl]) => (
                                <button key={key} onClick={() => startGame(key)} className={`${lvl.color} text-white p-4 rounded-2xl font-bold shadow-lg text-xl`}>
                                    {lvl.label}
                                </button>
                            ))}
                        </div>
                    )}

                    {gameState === 'playing' && (
                        <div className="w-full max-w-md">
                            <div className="bg-white p-8 rounded-3xl shadow-xl border-b-8 mb-6 text-center">
                                <div className="text-6xl font-black mb-6 ltr-text">{problem.a} {problem.op} {problem.b} =</div>
                                <div className={`text-6xl p-4 border-4 border-dashed rounded-2xl ${feedback === 'correct' ? 'bg-green-100 border-green-500 text-green-600' : 'bg-gray-50'}`}>
                                    {userInput || '?'}
                                </div>
                            </div>
                            <div className="grid grid-cols-3 gap-3 ltr-text">
                                {[1,2,3,4,5,6,7,8,9,0].map(n => (
                                    <button key={n} onClick={() => setUserInput(u => u + n)} className="bg-white p-5 text-3xl font-bold rounded-xl shadow active:scale-95 transition">{n}</button>
                                ))}
                                <button onClick={() => setUserInput('')} className="bg-red-50 p-5 text-xl font-bold rounded-xl text-red-600">מחק</button>
                                <button onClick={submit} className="bg-green-500 text-white p-5 text-3xl font-bold rounded-xl shadow">✓</button>
                            </div>
                        </div>
                    )}

                    {gameState === 'won' && <div className="text-center bg-white p-10 rounded-3xl shadow-2xl border-4 border-yellow-400">
                        <Icon name="Trophy" size={80} className="text-yellow-500 mx-auto mb-4" />
                        <h2 className="text-4xl font-black text-blue-800">אלופה!</h2>
                        <button onClick={() => setGameState('menu')} className="mt-6 bg-blue-600 text-white px-8 py-3 rounded-full font-bold">חזרה</button>
                    </div>}

                    {gameState === 'gameover' && <div className="text-center bg-white p-10 rounded-3xl shadow-2xl border-4 border-red-400">
                        <Icon name="Clock" size={80} className="text-red-500 mx-auto mb-4" />
                        <h2 className="text-3xl font-bold text-gray-800">נגמר הזמן!</h2>
                        <button onClick={() => setGameState('menu')} className="mt-6 bg-gray-200 px-8 py-3 rounded-full font-bold">נסה שוב</button>
                    </div>}

                    <footer className="mt-8 text-blue-400 font-bold flex items-center gap-2">מאבא למיקה מור ❤️</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MathGame />);
    </script>
</body>
</html>
